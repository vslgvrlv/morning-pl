<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Демо · Утренний P&L — конструктор дашборда</title>
<!-- Litepicker: range date picker (same as in RNP dashboard) -->
<script src="https://cdn.jsdelivr.net/npm/litepicker/dist/litepicker.js"></script>
<script src="https://cdn.jsdelivr.net/npm/litepicker/dist/plugins/ranges.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════════════
   RNP DESIGN BUNDLE (embedded from index.html)
   ═══════════════════════════════════════════════════════════════════ */
@font-face {
  font-family: 'Monaco';
  src: url('./Monaco.otf') format('opentype');
  font-weight: normal; font-style: normal; font-display: swap;
}

:root {
  --rnp-bg: #080c12;
  --rnp-surface: #0f1720;
  --rnp-surface-2: #151f2b;
  --rnp-surface-3: rgba(255,255,255,.025);
  --rnp-border: #1e2d3d;
  --rnp-text: #e8f0ff;
  --rnp-text-muted: #8aa0bc;
  --rnp-primary: #3b7ef5;
  --rnp-primary-2: #2560cc;
  --rnp-blue: #60a5fa;
  --rnp-blue-2: #93c5fd;
  --rnp-green: #4ade80;
  --rnp-violet: #a78bfa;
  --rnp-yellow: #fbbf24;
  --rnp-red: #f87171;
  --rnp-radius-sm: 10px;
  --rnp-radius-md: 12px;
  --rnp-radius-lg: 14px;
  --rnp-shadow: 0 12px 28px rgba(0,0,0,.32);
  --rnp-shadow-hover: 0 22px 48px rgba(0,0,0,.44);
  --rnp-font: 'Monaco', 'Menlo', 'Courier New', monospace;
  --rnp-container: 1500px;
  --rnp-gap-sm: 10px;
  --rnp-gap-md: 12px;
  --rnp-ease: cubic-bezier(.4,0,.2,1);
  --rnp-transition: 200ms cubic-bezier(.4,0,.2,1);
  --rnp-glass-blur: 20px;
  --rnp-glow-primary: rgba(59,126,245,.4);
  --rnp-panel-fill: linear-gradient(160deg, rgba(255,255,255,.055) 0%, rgba(255,255,255,.018) 100%);
  --rnp-panel-border-grad: linear-gradient(145deg, rgba(255,255,255,.18) 0%, rgba(255,255,255,.04) 50%, rgba(167,139,250,.1) 100%);
  --rnp-panel-fill-hover: linear-gradient(160deg, rgba(255,255,255,.075) 0%, rgba(255,255,255,.025) 100%);
  --rnp-panel-border-hover: linear-gradient(145deg, rgba(255,255,255,.28) 0%, rgba(255,255,255,.06) 50%, rgba(167,139,250,.2) 100%);
}

* { box-sizing: border-box; }
html, body { margin:0; padding:0; background:var(--rnp-bg); color:var(--rnp-text); font-family:var(--rnp-font); }
body { position:relative; min-height:100vh; overflow-x:hidden; }

body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 900px 700px at 15% 15%, rgba(47,110,229,.28) 0%, transparent 70%),
    radial-gradient(ellipse 700px 600px at 88% 85%, rgba(167,139,250,.22) 0%, transparent 70%),
    radial-gradient(ellipse 600px 500px at 60% 40%, rgba(96,165,250,.14) 0%, transparent 70%);
  animation: rnp-bg-breathe 20s ease-in-out infinite alternate;
}
@keyframes rnp-bg-breathe {
  0%   { opacity:.8; transform:scale(1) translate(0,0); }
  50%  { opacity:1; }
  100% { opacity:.9; transform:scale(1.07) translate(1.5%,1%); }
}

.rnp-app { position:relative; z-index:1; max-width:var(--rnp-container); margin:0 auto; padding:16px; }

/* Panel */
.rnp-panel {
  position:relative; overflow:hidden;
  border:1px solid transparent;
  background: var(--rnp-panel-fill) padding-box, var(--rnp-panel-border-grad) border-box;
  border-radius:var(--rnp-radius-lg);
  box-shadow: var(--rnp-shadow), inset 0 1px 0 rgba(255,255,255,.08);
  backdrop-filter:blur(var(--rnp-glass-blur)) saturate(140%);
  transition: background var(--rnp-transition), box-shadow var(--rnp-transition), transform var(--rnp-transition);
  animation: rnp-fade-up .45s var(--rnp-ease) both;
}

@keyframes rnp-fade-up {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:translateY(0); }
}

/* Form controls */
.rnp-select, .rnp-input {
  height:32px; padding:0 8px;
  border-radius:var(--rnp-radius-sm);
  font-size:12px; font-family:var(--rnp-font);
  border:1px solid var(--rnp-border);
  background:var(--rnp-surface-2); color:var(--rnp-text);
  outline:none; transition:border-color var(--rnp-transition);
}
.rnp-select:focus, .rnp-input:focus { border-color:var(--rnp-primary); }

.rnp-button {
  height:32px; padding:0 12px; border:none; cursor:pointer;
  font-family:var(--rnp-font); font-size:12px;
  border-radius:var(--rnp-radius-sm);
  background:linear-gradient(160deg, var(--rnp-primary), var(--rnp-primary-2));
  color:var(--rnp-text); transition:transform 150ms var(--rnp-ease), filter 150ms var(--rnp-ease);
}
.rnp-button:hover { transform:translateY(-1px); filter:brightness(1.12); }
.rnp-button-secondary { border:1px solid var(--rnp-border); background:var(--rnp-surface-2); color:var(--rnp-text); }
.rnp-button-secondary:hover { border-color:rgba(255,255,255,.14); }

/* Segmented control */
.rnp-segmented {
  display:inline-flex; gap:3px; padding:3px;
  border:1px solid var(--rnp-border); border-radius:var(--rnp-radius-sm); background:var(--rnp-surface-2);
}
.rnp-segmented button {
  height:28px; padding:0 10px; border:none; border-radius:8px;
  background:transparent; color:var(--rnp-text); cursor:pointer;
  font-family:var(--rnp-font); font-size:11px; transition:background var(--rnp-transition);
}
.rnp-segmented button:hover:not(.is-active) { background:rgba(255,255,255,.06); }
.rnp-segmented button.is-active { background:rgba(59,126,245,.2); color:var(--rnp-blue-2); }

/* Table */
.rnp-table { width:100%; border-collapse:collapse; font-size:12px; }
.rnp-table th, .rnp-table td { padding:6px 8px; border-bottom:1px solid rgba(255,255,255,.04); text-align:right; white-space:nowrap; }
.rnp-table th:first-child, .rnp-table td:first-child { text-align:left; }
.rnp-table th { position:sticky; top:0; background:var(--rnp-surface); color:var(--rnp-text-muted); font-size:10px; letter-spacing:.05em; text-transform:uppercase; }
.rnp-table tbody tr:hover { background:rgba(59,126,245,.05); }

/* P&L / compare / unit-econ shared table */
.wb-pnl-table, .wb-mcomp-table, .wb-ue-table {
  width:100%; border-collapse:collapse; font-size:12px;
}
.wb-pnl-table th, .wb-pnl-table td,
.wb-mcomp-table th, .wb-mcomp-table td,
.wb-ue-table th, .wb-ue-table td {
  padding:7px 10px; text-align:right; white-space:nowrap;
  border-bottom:1px solid rgba(255,255,255,.04);
}
.wb-pnl-table th, .wb-mcomp-table th, .wb-ue-table th {
  position:sticky; top:0; z-index:2;
  background:var(--rnp-surface);
  color:var(--rnp-text-muted); font-size:10px; letter-spacing:.05em; text-transform:uppercase;
  font-weight:normal;
}
.wb-pnl-table .wb-pnl-label,
.wb-mcomp-table .wb-pnl-label,
.wb-ue-table td:first-child { text-align:left; }
.wb-pnl-table .wb-pnl-val,
.wb-mcomp-table .wb-pnl-val { font-variant-numeric:tabular-nums; }
.wb-pnl-table tr.wb-pnl-section td {
  padding-top:12px; padding-bottom:4px;
  color:var(--rnp-text-muted); font-size:10px; letter-spacing:.06em; text-transform:uppercase;
  background:rgba(255,255,255,.02); border-bottom:none;
}
.wb-pnl-table tr.wb-pnl-headline td,
.wb-mcomp-table tr.wb-pnl-headline td {
  font-weight:600; font-size:13px;
  background:rgba(59,126,245,.04);
  border-top:1px solid rgba(255,255,255,.1);
}
.wb-pnl-table tr.wb-pnl-final td {
  font-size:14px;
  background:rgba(59,126,245,.08);
  border-top:2px solid rgba(255,255,255,.18);
}
.wb-pnl-table tbody tr:hover,
.wb-mcomp-table tbody tr:hover,
.wb-ue-table tbody tr:hover { background:rgba(59,126,245,.06); }
.wb-mcomp-table .wb-leader {
  color:var(--rnp-yellow); margin-left:4px; font-size:12px;
}

/* Split-bar fact+pipe inside P&L table */
.wb-pnl-bar-cell { width:34%; padding:0 10px !important; }
.wb-pnl-bar-wrap {
  position:relative; height:16px; min-width:40px;
}
.wb-pnl-bar-fact {
  position:relative; z-index:2; height:100%; border-radius:4px; min-width:2px;
  transition: width .6s cubic-bezier(.2,.9,.3,1);
}
.wb-pnl-bar-pipe {
  position:absolute; top:0; left:0; height:100%;
  border-radius:4px; border:1px dashed; opacity:0.55; z-index:1;
  transition: width .6s cubic-bezier(.2,.9,.3,1);
}
.wb-pnl-bar-fact.income  { background: linear-gradient(90deg, var(--rnp-green), #22c55e); }
.wb-pnl-bar-fact.expense { background: linear-gradient(90deg, var(--rnp-red), #ef4444); }
.wb-pnl-bar-fact.transit { background: linear-gradient(90deg, #475569, #64748b); }
.wb-pnl-bar-fact.net-pos { background: linear-gradient(90deg, var(--rnp-green), #22c55e); }
.wb-pnl-bar-fact.net-neg { background: linear-gradient(90deg, var(--rnp-red), #ef4444); }
.wb-pnl-bar-pipe.income  { background: rgba(74,222,128,.22);  border-color: var(--rnp-green); }
.wb-pnl-bar-pipe.expense { background: rgba(248,113,113,.22); border-color: var(--rnp-red); }
.wb-pnl-bar-pipe.transit { background: rgba(100,116,139,.22); border-color: #64748b; }
.wb-pnl-bar-pipe.net-pos { background: rgba(74,222,128,.22);  border-color: var(--rnp-green); }
.wb-pnl-bar-pipe.net-neg { background: rgba(248,113,113,.22); border-color: var(--rnp-red); }

/* Small pipe value next to fact value */
.wb-pnl-pipe-label {
  display:block; font-size:10px; color:var(--rnp-text-muted); margin-top:1px;
  font-variant-numeric:tabular-nums;
}

/* Clickable rows */
.wb-pnl-table tr.wb-pnl-click { cursor:pointer; transition: background var(--rnp-transition); }
.wb-pnl-table tr.wb-pnl-click:hover { background: rgba(59,126,245,.08); }
.wb-pnl-table tr.wb-pnl-click.is-open { background: rgba(59,126,245,.1); }

/* Drill-down row */
.wb-pnl-drill-row td {
  padding: 0 !important; border:none !important;
}
.wb-pnl-drill-box {
  max-height: 280px; overflow-y: auto;
  background: rgba(0,0,0,.25); border-top: 1px solid rgba(59,126,245,.2);
  animation: rnp-fade-up .2s var(--rnp-ease);
}
.wb-pnl-drill-row-item {
  display:flex; align-items:center; gap:10px;
  padding: 6px 14px; font-size: 11px;
  border-bottom: 1px solid rgba(255,255,255,.03);
}
.wb-pnl-drill-row-item:last-child { border-bottom: none; }
.wb-pnl-drill-row-item a { color: var(--rnp-blue); text-decoration: none; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.wb-pnl-drill-row-item a:hover { text-decoration: underline; }
.wb-pnl-drill-row-item .dd-stage { font-size:10px; color:var(--rnp-text-muted); min-width:80px; text-align:right; }
.wb-pnl-drill-row-item .dd-amt { font-variant-numeric:tabular-nums; white-space:nowrap; min-width:100px; text-align:right; }
.wb-pnl-drill-row-item.is-won { background: rgba(74,222,128,.04); }
.wb-pnl-drill-pipe-badge {
  display:inline-block; padding: 1px 6px; margin-right:6px;
  background: rgba(248,113,113,.12); color: var(--rnp-red);
  border-radius: 3px; font-size: 9px; font-weight: 600; text-transform: uppercase;
}
.wb-pnl-drill-won-badge {
  display:inline-block; padding: 1px 6px; margin-right:6px;
  background: rgba(74,222,128,.12); color: var(--rnp-green);
  border-radius: 3px; font-size: 9px; font-weight: 600; text-transform: uppercase;
}
.wb-pnl-drill-empty { padding: 16px; text-align: center; color: var(--rnp-text-muted); font-size: 11px; }
.wb-pnl-drill-loading { padding: 12px; text-align: center; color: var(--rnp-text-muted); font-size: 11px; }

/* ─── Period label (shared) ─── */
.wb-pnl-period-label {
  font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
  color: var(--rnp-text-muted); margin-bottom: 8px; padding: 0 4px;
}

/* ─── Mode: Группы (grouped) ─── */
.wb-pnl-groups { display: flex; flex-direction: column; gap: 14px; }
.wb-pnl-grp-head {
  font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
  color: var(--rnp-text-muted); padding: 4px 4px 6px;
  border-bottom: 1px solid rgba(255,255,255,.06);
  display: flex; align-items: center; gap: 8px;
}
.wb-pnl-grp-body { display: flex; flex-direction: column; gap: 2px; padding: 4px 0 0; }
.wb-pnl-grp-row {
  display: grid; grid-template-columns: 1.6fr 2fr 48px 1.1fr;
  align-items: center; gap: 10px; padding: 5px 8px;
  font-size: 12px; border-radius: 6px;
  transition: background var(--rnp-transition);
}
.wb-pnl-grp-row.wb-pnl-click { cursor: pointer; }
.wb-pnl-grp-row.wb-pnl-click:hover { background: rgba(59,126,245,.06); }
.wb-pnl-grp-row.is-open { background: rgba(59,126,245,.09); }
.wb-pnl-grp-row.wb-pnl-grp-headline {
  background: rgba(59,126,245,.05);
  font-weight: 600; font-size: 13px;
  border-top: 1px solid rgba(255,255,255,.08);
  padding: 8px 8px; margin-top: 4px;
}
.wb-pnl-grp-row.wb-pnl-grp-final {
  background: rgba(59,126,245,.1);
  font-weight: 700; font-size: 14px;
  border-top: 2px solid rgba(255,255,255,.18);
  padding: 10px 8px; margin-top: 6px;
}
.wb-pnl-grp-label { color: var(--rnp-text); }
.wb-pnl-grp-headline .wb-pnl-grp-label,
.wb-pnl-grp-final .wb-pnl-grp-label { color: var(--rnp-text); }
.wb-pnl-grp-bar { padding: 0; }
.wb-pnl-grp-val { text-align: right; font-variant-numeric: tabular-nums; }
.wb-pnl-pct {
  text-align: right; font-size: 11px; color: var(--rnp-text-muted);
  font-variant-numeric: tabular-nums; padding: 0 4px;
}

/* ─── Mode: Водопад (waterfall) ─── */
.wb-pnl-wf {
  display: flex; flex-direction: column; gap: 3px;
  padding: 8px; background: rgba(0,0,0,.15); border-radius: 8px;
  border: 1px solid rgba(255,255,255,.04);
}
.wb-pnl-wf-row {
  display: grid; grid-template-columns: 1.4fr 2.5fr 1fr;
  align-items: center; gap: 10px; padding: 3px 4px;
  font-size: 11px;
}
.wb-pnl-wf-marker {
  margin-top: 4px; padding-top: 6px;
  border-top: 1px dashed rgba(255,255,255,.08);
  font-weight: 600; font-size: 12px;
}
.wb-pnl-wf-final {
  margin-top: 6px; padding: 6px 4px;
  border-top: 2px solid rgba(255,255,255,.18);
  font-weight: 700; font-size: 13px;
  background: rgba(59,126,245,.06); border-radius: 4px;
}
.wb-pnl-wf-label { color: var(--rnp-text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.wb-pnl-wf-marker .wb-pnl-wf-label,
.wb-pnl-wf-final .wb-pnl-wf-label { color: var(--rnp-text); }
.wb-pnl-wf-bar-wrap {
  position: relative; height: 14px;
  background: rgba(255,255,255,.03); border-radius: 4px; overflow: hidden;
}
.wb-pnl-wf-bar {
  height: 100%; border-radius: 4px; min-width: 2px;
  transition: width .5s cubic-bezier(.2,.9,.3,1);
}
.wb-pnl-wf-val { text-align: right; font-variant-numeric: tabular-nums; }

.rnp-empty { padding:24px; text-align:center; color:var(--rnp-text-muted); font-size:12px; }

/* ═══════════════════════════════════════════════════════════════════
   WORKBENCH CSS
   ═══════════════════════════════════════════════════════════════════ */

/* Topbar */
.wb-topbar {
  display:flex; justify-content:space-between; align-items:center; gap:12px;
  margin-bottom:12px; flex-wrap:wrap;
}
.wb-topbar-left { display:flex; align-items:center; gap:12px; }
.wb-topbar-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.wb-title { font-size:18px; font-weight:normal; letter-spacing:-0.01em; }
.wb-subtitle { font-size:11px; color:var(--rnp-text-muted); }

/* Period bar — navigation + preset select + arrows */
.wb-period-bar {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--rnp-surface-2); border: 1px solid var(--rnp-border);
  border-radius: var(--rnp-radius-sm); padding: 2px;
}
.wb-pbtn {
  width: 28px; height: 28px; border: none; border-radius: 6px;
  background: transparent; color: var(--rnp-text); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all var(--rnp-transition);
}
.wb-pbtn:hover:not(:disabled) { background: rgba(59,126,245,.15); color: var(--rnp-blue-2); }
.wb-pbtn:disabled { opacity: 0.3; cursor: default; }
.wb-pselect {
  height: 28px; padding: 0 8px; border: none; background: transparent;
  color: var(--rnp-text); font-family: var(--rnp-font); font-size: 12px;
  cursor: pointer; outline: none; border-radius: 6px;
}
.wb-pselect:hover { background: rgba(255,255,255,.04); }
.wb-pselect:focus { background: rgba(59,126,245,.08); }

.wb-period-label {
  font-size: 11px; color: var(--rnp-text-muted);
  letter-spacing: .02em;
}

/* Custom range popup */
.wb-custom-range {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  padding: 10px 12px; margin-bottom: 12px;
  background: var(--rnp-surface-2); border: 1px solid var(--rnp-border);
  border-radius: var(--rnp-radius-md);
  animation: rnp-fade-up .2s var(--rnp-ease);
}
.wb-cr-presets { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.wb-cr-label { font-size: 10px; color: var(--rnp-text-muted); text-transform: uppercase; letter-spacing: .06em; margin-right: 4px; }
.wb-cr-preset {
  height: 26px; padding: 0 10px;
  border: 1px solid var(--rnp-border); border-radius: 6px;
  background: transparent; color: var(--rnp-text-muted);
  font-family: var(--rnp-font); font-size: 11px; cursor: pointer;
  transition: all var(--rnp-transition);
}
.wb-cr-preset:hover { color: var(--rnp-text); border-color: var(--rnp-primary); background: rgba(59,126,245,.06); }
.wb-cr-preset.is-active { color: var(--rnp-blue-2); border-color: var(--rnp-primary); background: rgba(59,126,245,.12); }

.wb-cr-picker-wrap { display: flex; align-items: center; gap: 6px; }
.wb-cr-trigger {
  min-width: 220px; height: 30px; padding: 0 12px;
  border: 1px solid var(--rnp-border); border-radius: var(--rnp-radius-sm);
  background: var(--rnp-surface); color: var(--rnp-text);
  font-family: var(--rnp-font); font-size: 12px; cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px; font-weight: 600;
}
.wb-cr-trigger::before { content: '📅'; font-size: 13px; }
.wb-cr-trigger:hover { border-color: var(--rnp-primary); }

/* Litepicker theme override to fit dark mode */
.litepicker { font-family: var(--rnp-font) !important; }
.litepicker .container__months { background: var(--rnp-surface) !important; border: 1px solid var(--rnp-border) !important; }
.litepicker .container__months .month-item-header div > .month-item-name,
.litepicker .container__months .month-item-header div > .month-item-year,
.litepicker .container__days .day-item { color: var(--rnp-text) !important; }
.litepicker .container__days .day-item.is-today { color: var(--rnp-blue-2) !important; }
.litepicker .container__days .day-item:hover { box-shadow: inset 0 0 0 1px var(--rnp-primary) !important; color: var(--rnp-text) !important; }
.litepicker .container__days .day-item.is-start-date,
.litepicker .container__days .day-item.is-end-date { background: var(--rnp-primary) !important; color: #fff !important; }
.litepicker .container__days .day-item.is-in-range { background: rgba(59,126,245,.18) !important; color: var(--rnp-text) !important; }
.litepicker .container__days .day-item.is-locked { color: rgba(255,255,255,.1) !important; }
.litepicker .container__months .month-item-header .button-previous-month svg,
.litepicker .container__months .month-item-header .button-next-month svg { fill: var(--rnp-text) !important; }

/* Toolbar */
.wb-toolbar {
  display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap;
}
.wb-toolbar-spacer { flex:1; }
.wb-count { font-size:11px; color:var(--rnp-text-muted); }

/* Grid */
.wb-grid {
  display:grid;
  grid-template-columns:repeat(12, 1fr);
  gap:12px;
  min-height:120px;
}
.wb-grid-empty {
  grid-column:1 / -1;
  display:flex; align-items:center; justify-content:center;
  min-height:200px; border:2px dashed var(--rnp-border); border-radius:var(--rnp-radius-lg);
  color:var(--rnp-text-muted); font-size:13px;

<script>
/* ═══════════════════════════════════════════════════════════════════
   CONFIG
   ═══════════════════════════════════════════════════════════════════ */
const API_BASE = '';
const STORAGE_KEY = 'morning-pl-demo-layout';
const LAYOUT_VERSION = 1;
const DEMO_MODE = true;

/* ═══════════════════════════════════════════════════════════════════
   DATA LAYER
   ═══════════════════════════════════════════════════════════════════ */
const DATA = { fact: null, deals: null };

const MONTH_NAMES = {
  '01':'Январь','02':'Февраль','03':'Март','04':'Апрель',
  '05':'Май','06':'Июнь','07':'Июль','08':'Август',
  '09':'Сентябрь','10':'Октябрь','11':'Ноябрь','12':'Декабрь'
};

async function apiFetch(ep) {
  // DEMO_MODE: no real network calls, all data is hardcoded below
  if (ep.startsWith('/api/sync-status')) {
    return { last_sync: { finished_at: new Date().toISOString() }, deals_in_db: 234 };
  }
  return {};
}

function getCurrentMode() {
  return document.querySelector('#mode-toggle button.is-active')?.dataset.mode || 'pnl';
}

/* ═══════════════════════════════════════════════════════════════════
   PERIOD SELECTOR — date range with presets and custom picker
   ═══════════════════════════════════════════════════════════════════ */

// Date helpers
function toISO(d) {
  if (typeof d === 'string') return d;
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function parseISO(s) { return new Date(s + 'T00:00:00'); }
function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}
function daysBetween(from, to) {
  const f = typeof from === 'string' ? parseISO(from) : from;
  const t = typeof to   === 'string' ? parseISO(to)   : to;
  return Math.round((t - f) / 86400000) + 1;
}

let PERIOD = {
  mode: '30',        // '7'|'14'|'30'|'60'|'90'|'mtd'|'custom'
  offset: 0,         // steps back (for rolling periods)
  from: null,        // for custom
  to: null,          // for custom
};

function getPeriod() {
  const today = new Date(); today.setHours(0,0,0,0);
  const m = PERIOD.mode;

  if (m === 'custom') {
    if (!PERIOD.from || !PERIOD.to) {
      return { from: toISO(addDays(today, -29)), to: toISO(today), label: 'Выбери даты', days: 30 };
    }
    return { from: PERIOD.from, to: PERIOD.to, label: fmtPeriodLabel(PERIOD.from, PERIOD.to), days: daysBetween(PERIOD.from, PERIOD.to) };
  }

  if (m === 'mtd') {
    const first = new Date(today.getFullYear(), today.getMonth(), 1);
    const ref = PERIOD.offset > 0
      ? new Date(today.getFullYear(), today.getMonth() - PERIOD.offset, 1)
      : first;
    const end = PERIOD.offset > 0
      ? new Date(today.getFullYear(), today.getMonth() - PERIOD.offset + 1, 0)
      : today;
    return { from: toISO(ref), to: toISO(end), label: fmtPeriodLabel(toISO(ref), toISO(end)), days: daysBetween(ref, end) };
  }

  const days = parseInt(m, 10);
  const to = addDays(today, -PERIOD.offset * days);
  const from = addDays(to, -(days - 1));
  return { from: toISO(from), to: toISO(to), label: fmtPeriodLabel(toISO(from), toISO(to)), days };
}

function fmtPeriodLabel(from, to) {
  if (!from || !to) return '—';
  const f = parseISO(from), t = parseISO(to);
  const sameYear = f.getFullYear() === t.getFullYear();
  const sameMonth = sameYear && f.getMonth() === t.getMonth();
  const sameDay = sameMonth && f.getDate() === t.getDate();
  if (sameDay) return f.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
  if (sameMonth) return `${f.getDate()}–${t.getDate()} ${f.toLocaleDateString('ru-RU', { month: 'short', year: 'numeric' })}`;
  const fOpts = sameYear ? { day: 'numeric', month: 'short' } : { day: 'numeric', month: 'short', year: 'numeric' };
  return `${f.toLocaleDateString('ru-RU', fOpts)} — ${t.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' })}`;
}

function applyPresetRange(preset) {
  const today = new Date(); today.setHours(0,0,0,0);
  let from, to;
  if (preset === 'today') { from = to = today; }
  else if (preset === 'yesterday') { from = to = addDays(today, -1); }
  else if (preset === 'this-week') {
    const day = (today.getDay() + 6) % 7;
    from = addDays(today, -day);
    to = today;
  } else if (preset === 'last-week') {
    const day = (today.getDay() + 6) % 7;
    from = addDays(today, -day - 7);
    to = addDays(from, 6);
  } else if (preset === 'this-month') {
    from = new Date(today.getFullYear(), today.getMonth(), 1);
    to = today;
  } else if (preset === 'last-month') {
    from = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    to = new Date(today.getFullYear(), today.getMonth(), 0);
  } else { return; }
  PERIOD.from = toISO(from);
  PERIOD.to = toISO(to);
  PERIOD.mode = 'custom';
  document.getElementById('wb-period-select').value = 'custom';
  toggleCustomRange();
  if (LITEPICKER) LITEPICKER.setDateRange(PERIOD.from, PERIOD.to);
  updateTriggerLabel();
  updatePeriodUI();
  reloadAll();
}

function updatePeriodUI() {
  const p = getPeriod();
  document.getElementById('wb-period-label').textContent = p.label;
  // Disable "next" when at offset 0
  document.getElementById('wb-next').disabled = PERIOD.offset <= 0;
  // Hide arrows in custom mode
  const isCustom = PERIOD.mode === 'custom';
  document.getElementById('wb-prev').style.display = isCustom ? 'none' : '';
  document.getElementById('wb-next').style.display = isCustom ? 'none' : '';
}

function toggleCustomRange() {
  const el = document.getElementById('wb-custom-range');
  el.style.display = PERIOD.mode === 'custom' ? 'flex' : 'none';
}

function updateTriggerLabel() {
  const el = document.getElementById('wb-cr-trigger');
  if (!el) return;
  if (PERIOD.from && PERIOD.to) {
    el.textContent = fmtPeriodLabel(PERIOD.from, PERIOD.to);
  } else {

let ALL_DEALS = null;
function generateAllDeals() {
  if (ALL_DEALS) return ALL_DEALS;
  const pseudoRand = (seed) => { let x = Math.sin(seed) * 10000; return x - Math.floor(x); };
  const today = new Date(); today.setHours(0,0,0,0);
  const RANGE_DAYS = 180; // history depth — so custom periods up to 90d still find data
  const DEALS_TOTAL = 1200;
  const all = [];
  let idCounter = 1001;
  for (let i = 0; i < DEALS_TOTAL; i++) {
    let r = pseudoRand(i + 17), acc = 0, stage = MOCK_STAGES[0];
    for (const s of MOCK_STAGES) { acc += s.weight; if (r < acc) { stage = s; break; } }
    const marketer = pseudoRand(i + 91) < 0.58 ? 'dmitry' : 'ilya';
    const utm_medium = marketer === 'dmitry' ? 'dm.kh-cpc' : 'cpc';
    const opp = Math.round((50 + pseudoRand(i + 33) * 150) * 1000 / 100) * 100;
    const profitPct = 0.12 + pseudoRand(i + 77) * 0.08;
    const profit = Math.round(opp * profitPct / 100) * 100;
    const daysAgo = Math.floor(pseudoRand(i + 3) * RANGE_DAYS);
    const dcreate = new Date(today.getTime() - daysAgo * 86400000);
    let dclose = null;
    if (stage.key === 'paid' || stage.key === 'completed') {
      const closeDays = Math.floor(4 + pseudoRand(i + 5) * 18);
      const dcloseCand = new Date(dcreate.getTime() + closeDays * 86400000);
      if (dcloseCand <= today) dclose = dcloseCand;
      else {
        // force to pipeline-side — if close would be in future, keep as in_progress
        stage = MOCK_STAGES.find(s => s.key === 'in_progress');
      }
    }
    all.push({
      id: idCounter++,
      title: MOCK_DEAL_TITLES[i % MOCK_DEAL_TITLES.length],
      stage_id: stage.key, stage_name: stage.name,
      opportunity: opp, profit: profit,
      date_create: toISO(dcreate),
      close_date: dclose ? toISO(dclose) : null,
      utm_source: 'yandex', utm_medium,
      utm_campaign: 'detailing_' + (marketer === 'dmitry' ? 'premium' : 'mass'),
      contact_id: 5000 + i,
      assigned_by_id: marketer === 'dmitry' ? 102 : 103,
      marketer,
      responsible: marketer === 'dmitry' ? 'Дмитрий' : 'Илья',
      source: marketer === 'dmitry' ? 'Дмитрий' : 'Илья',
    });
  }
  ALL_DEALS = all;
  return all;
}

async function loadFactFromAPI() {
  // DEMO_MODE: filter pre-generated deals by period + mode
  const p = getPeriod();
  const mode = getCurrentMode();
  const periodLabel = p.label;
  const periodDays = Math.max(1, daysBetween(p.from, p.to));
  const all = generateAllDeals();

  // Filter deals by period.
  // PNL mode: period covers lead cohort → filter by date_create.
  // DDS mode: period covers cash arrival → won by close_date, rest by date_create.
  const inRange = (iso) => iso && iso >= p.from && iso <= p.to;
  const deals = all.filter(d => {
    if (mode === 'dds') {
      if (d.stage_id === 'paid' || d.stage_id === 'completed') {
        return inRange(d.close_date);
      }
      return inRange(d.date_create);
    }
    return inRange(d.date_create);
  });

  // Funnel counts — cumulative by stage order
  const funnelMap = { qualified:0, consultation_booked:0, consultation_visited:0, wrap_booked:0, in_progress:0, completed:0, paid:0 };
  let lostTotal = 0;
  const order = ['qualified','consultation_booked','consultation_visited','wrap_booked','in_progress','completed','paid'];
  for (const d of deals) {
    if (d.stage_id === 'lost') { lostTotal++; continue; }
    const idx = order.indexOf(d.stage_id);
    if (idx >= 0) for (let i = 0; i <= idx; i++) funnelMap[order[i]]++;
  }

  // Won / Pipeline
  const wonDeals = deals.filter(d => d.stage_id === 'paid' || d.stage_id === 'completed');
  const wonRevenue = wonDeals.reduce((s,d) => s + d.opportunity, 0);
  const wonProfit = wonDeals.reduce((s,d) => s + d.profit, 0);
  const pipelineDeals = deals.filter(d => d.stage_id !== 'lost');
  const pipeline = pipelineDeals.reduce((s,d) => s + d.opportunity, 0);
  const pipelineProfit = pipelineDeals.reduce((s,d) => s + d.profit, 0);

  const clientRevenue = wonRevenue;
  const commissionEA = wonProfit;
  const transitToPartner = Math.max(clientRevenue - commissionEA, 0);
  const pipelineTransit = Math.max(pipeline - pipelineProfit, 0);
  const wonDealsCount = wonDeals.length;
  const avgCheck = wonDealsCount > 0 ? Math.round(wonRevenue / wonDealsCount) : 0;
  const avgMargin = clientRevenue > 0 ? commissionEA / clientRevenue : 0;

  // Marketing — spend scales linearly with period length (base 30 days)
  const scale = periodDays / 30;
  const dSpendBase = 220000, iSpendBase = 148000;
  const dFotBase = 50000, iFotBase = 38000;
  const dSpend = Math.round(dSpendBase * scale);
  const iSpend = Math.round(iSpendBase * scale);
  const dFot = Math.round(dFotBase * scale);
  const iFot = Math.round(iFotBase * scale);
  const dDeals = deals.filter(d => d.marketer === 'dmitry');
  const iDeals = deals.filter(d => d.marketer === 'ilya');
  const dPaid = dDeals.filter(d => d.stage_id === 'paid' || d.stage_id === 'completed').length;
  const iPaid = iDeals.filter(d => d.stage_id === 'paid' || d.stage_id === 'completed').length;
  const dLeads = dDeals.length, iLeads = iDeals.length;
  const dCpl = dLeads > 0 ? Math.round(dSpend / dLeads) : 0;
  const iCpl = iLeads > 0 ? Math.round(iSpend / iLeads) : 0;

  // Fixed expenses also scale with period
  const fixed = [
    { name:'CRM Битрикс24', amount:Math.round(12000 * scale) },
    { name:'Аренда офиса',  amount:Math.round(45000 * scale) },
    { name:'Бухгалтерия',   amount:Math.round(18000 * scale) },
    { name:'Юрист',         amount:Math.round(8000 * scale) },
  ];
  const fixedTotal = fixed.reduce((s,f)=>s+f.amount,0);
  const acquiringFact = Math.round(wonRevenue * 0.035 * 0.7);
  const acquiringPipe = Math.round(pipeline * 0.035 * 0.7);
  const marketingSpend = dSpend + iSpend;
  const marketingFot = dFot + iFot;
  const totalFact = marketingSpend + marketingFot + fixedTotal + acquiringFact;
  const totalPipe = marketingSpend + marketingFot + fixedTotal + acquiringPipe;
  const taxFact = Math.max(0, Math.round((commissionEA - totalFact) * 0.15));
  const taxPipe = Math.max(0, Math.round((pipelineProfit - totalPipe) * 0.15));
  const netProfit = commissionEA - totalFact - taxFact;
  const netProfitPipe = pipelineProfit - totalPipe - taxPipe;

  DATA.rnp = [];
  DATA.deals = deals;

  DATA.fact = {
    period: periodLabel,
    deals: {
      total: deals.length,
      funnel: {
        leads: funnelMap.qualified,
        kpSent: funnelMap.consultation_booked,
        kpAgreed: funnelMap.consultation_visited,
        recorded: funnelMap.wrap_booked,
        arrived: funnelMap.in_progress,
        completed: funnelMap.completed,
        paid: funnelMap.paid,
        lost: lostTotal,
      },
      mix: [
        { name:'Базовая мойка + полировка', pct:12, avgCheck:18000, markupType:'zones' },
        { name:'Защитная плёнка зоны риска', pct:48, avgCheck:75000, markupType:'zones' },
        { name:'Керамика кузова',            pct:28, avgCheck:95000, markupType:'full' },
        { name:'Полный комплекс + детейлинг', pct:12, avgCheck:180000, markupType:'full' },
      ],
      clientRevenue, transitToPartner, commissionEA, avgCheck,
      completedCount: deals.length, avgMargin,
      wonRevenue, wonProfit, wonDeals: wonDealsCount,
      totalPipeline: pipeline, totalProfit: pipelineProfit,
      pipelineTransit,
    },
    marketing: {
      dmitry: { budget:dSpend, fot:dFot, leads:dLeads, cpl:dCpl, payments:dPaid },
      ilya:   { budget:iSpend, fot:iFot, leads:iLeads, cpl:iCpl, payments:iPaid },
    },
    expenses: {
      fixed, fixedTotal,
      acquiringFact, acquiringPipe,
      marketingSpend, marketingFot,
      marketingByName: { dmitry:dSpend, ilya:iSpend },
      staff: [ {name:'dmitry', amount:dFot}, {name:'ilya', amount:iFot} ],
      totalFact, totalPipe,
    },
    tax: { regime:'usn_15', rate:0.15, amountFact:taxFact, amountPipe:taxPipe },
    netProfit, netProfitPipe,
    romi: 0,
  };

  const f = DATA.fact;
  const totalMkt = (f.marketing.dmitry.budget||0) + (f.marketing.ilya.budget||0);
  f.romi = totalMkt > 0 ? ((f.deals.commissionEA - totalMkt) / totalMkt) * 100 : 0;

  return DATA.fact;
}

/* ═══════════════════════════════════════════════════════════════════
   DATA ACCESS — generic, any widget can use any data
   ═══════════════════════════════════════════════════════════════════ */

function getVal(key) {
  if (!DATA.fact) return null;
  return key.split('.').reduce((o, k) => o?.[k], DATA.fact);
}

function fmt(n) {
  if (n == null || isNaN(n)) return '\u2014';
  const abs = Math.abs(Math.round(n));
  const s = abs.toLocaleString('ru-RU');
  return n < 0 ? `(${s})\u20BD` : `${s}\u20BD`;
}
function fmtShort(n) {
  if (n == null || isNaN(n)) return '\u2014';
  const abs = Math.abs(n);
  if (abs >= 1e6) return (n<0?'\u2212':'') + (abs/1e6).toFixed(1) + 'M\u20BD';
  if (abs >= 1e3) return (n<0?'\u2212':'') + Math.round(abs/1e3) + '\u043A\u20BD';
  return fmt(n);
}
function fmtPct(n) { return (n==null||isNaN(n)) ? '\u2014' : Math.round(n*100)+'%'; }
function fmtPctRaw(n) { return (n==null||isNaN(n)) ? '\u2014' : Math.round(n)+'%'; }
function fmtNum(n) { return (n==null||isNaN(n)) ? '\u2014' : Math.round(n).toLocaleString('ru-RU'); }

function fmtAuto(n, format) {
  if (format === 'money') return fmt(n);
  if (format === 'moneyShort') return fmtShort(n);
  if (format === 'pct') return fmtPct(n);
  if (format === 'pctRaw') return fmtPctRaw(n);
  return fmtNum(n);
}

    if (c.group !== lastGroup) {

      html += `<optgroup label="${c.group}">`;

function render_bar(w, el) {
  const metric = w.metric || 'money';
  const items = w.bars || [
    { label:'Дмитрий', dataPath:'marketing.dmitry.budget' },
    { label:'Илья', dataPath:'marketing.ilya.budget' },
  ];
  const values = items.map(it => ({ label:it.label, value:getVal(it.dataPath)||0 }));
  const maxVal = Math.max(...values.map(v => Math.abs(v.value)), 1);
  const colors = ['var(--rnp-blue)','var(--rnp-violet)','var(--rnp-green)','var(--rnp-yellow)','var(--rnp-red)'];

  el.innerHTML = values.map((v, i) => {
    const pct = Math.abs(v.value) / maxVal * 100;
    const color = colors[i % colors.length];
    return `<div class="wb-bar-row">
      <div class="wb-bar-label">${v.label}</div>
      <div class="wb-bar-track"><div class="wb-bar-fill" style="width:${pct}%;background:${color}">${pct > 20 ? fmtShort(v.value) : ''}</div></div>
      <div class="wb-bar-value">${fmt(v.value)}</div>
    </div>`;
  }).join('');
}

  }).join('') + `<div class="wb-wf-row total">
    <div class="wb-wf-label">Чистая прибыль</div>
    <div class="wb-wf-bar-wrap"><div class="wb-wf-bar ${net>=0?'net-pos':'net-neg'}" style="width:${Math.abs(net)/maxVal*100}%"></div></div>
    <div class="wb-wf-amount" style="color:${net>=0?'var(--rnp-green)':'var(--rnp-red)'}">${fmt(net)}</div>
  </div>`;
}

function render_funnel(w, el) {
  const metric = w.metric || 'count';
  const deals = filterDeals(w.filters);
  const f = DATA.fact;

  // Build funnel from deals or from aggregated data
  const stages = [
    { key:'qualified', label:'Лиды' },
    { key:'consultation_booked', label:'КП отправлено' },
    { key:'consultation_visited', label:'КП согласовано' },
    { key:'wrap_booked', label:'Записан' },
    { key:'in_progress', label:'В работе' },
    { key:'completed', label:'Завершён' },
    { key:'paid', label:'Оплачен' },
  ];

  // If filtered, count from deals array; otherwise use aggregated funnel data
  let stageValues;
  if (w.filters?.source || w.filters?.stage) {
    // Client-side: group deals by stage, count cumulatively
    const stageCounts = {};
    for (const d of deals) stageCounts[d.stage_name] = (stageCounts[d.stage_name]||0) + 1;
    const stageMoneys = {};
    for (const d of deals) stageMoneys[d.stage_name] = (stageMoneys[d.stage_name]||0) + (d.opportunity||0);

    // Cumulative funnel: each stage includes all later stages
    const orderedKeys = stages.map(s => s.key);
    stageValues = stages.map((s, i) => {
      const laterKeys = orderedKeys.slice(i);
      const count = laterKeys.reduce((sum, k) => sum + (stageCounts[k]||0), 0);
      const money = laterKeys.reduce((sum, k) => sum + (stageMoneys[k]||0), 0);
      return { ...s, count, money };
    });
  } else {
    // Use pre-aggregated data
    const fk = f?.deals?.funnel || {};
    stageValues = [
      { ...stages[0], count:fk.leads||0, money:f?.deals?.clientRevenue||0 },
      { ...stages[1], count:fk.kpSent||0, money:0 },
      { ...stages[2], count:fk.kpAgreed||0, money:0 },
      { ...stages[3], count:fk.recorded||0, money:0 },
      { ...stages[4], count:fk.arrived||0, money:0 },
      { ...stages[5], count:fk.completed||0, money:f?.deals?.wonRevenue||0 },
      { ...stages[6], count:fk.paid||0, money:f?.deals?.wonProfit||0 },
    ];
  }

  const maxVal = Math.max(...stageValues.map(s => metric === 'money' ? s.money : s.count), 1);
  const firstVal = metric === 'money' ? stageValues[0]?.money : stageValues[0]?.count;

  el.innerHTML = stageValues.map((s, i) => {
    const val = metric === 'money' ? s.money : s.count;
    const pct = val / maxVal * 100;
    const cr = i > 0 && firstVal > 0 ? Math.round(val / firstVal * 100) : 100;
    const display = metric === 'money' ? fmtShort(val) : val;
    return `<div class="wb-funnel-step">
      <div class="wb-funnel-label">${s.label}</div>
      <div class="wb-funnel-bar-wrap">
        <div class="wb-funnel-bar" style="width:${Math.max(pct,4)}%">${display}</div>
      </div>
      ${i > 0 ? `<span class="wb-funnel-cr">${cr}%</span>` : ''}
    </div>`;
  }).join('');
}

function render_donut(w, el) {
  const metric = w.metric || 'count';
  const mix = DATA.fact?.deals?.mix || [];
  const totalDeals = DATA.fact?.deals?.total || 1;

  // Calculate values based on metric
  const items = mix.map(m => {
    let value;
    if (metric === 'money') {
      value = m.avgCheck * (m.pct / 100) * totalDeals;
    } else if (metric === 'margin') {
      const markup = m.markupType === 'zones' ? 0.22 : 0.18;
      value = m.avgCheck * (m.pct / 100) * totalDeals * (markup / (1 + markup));
    } else {
      value = m.pct; // count = percentage
    }
    return { name: m.name, value, pct: m.pct };
  });

  // Recalc percentages for money/margin mode
  if (metric !== 'count') {
    const total = items.reduce((s, it) => s + it.value, 0) || 1;
    items.forEach(it => it.pct = Math.round(it.value / total * 100));
  }

  const colors = ['#60a5fa','#a78bfa','#4ade80','#fbbf24'];
  let gradientParts = [];
  let cumPct = 0;
  items.forEach((it, i) => {
    gradientParts.push(`${colors[i]} ${cumPct}% ${cumPct + it.pct}%`);
    cumPct += it.pct;
  });

  const legend = items.map((it, i) => `
    <div class="wb-legend-item">
      <div class="wb-legend-dot" style="background:${colors[i]}"></div>
      <span class="wb-legend-pct">${it.pct}%</span>
      <span>${it.name}</span>
      ${metric !== 'count' ? `<span style="color:var(--rnp-text-muted);font-size:10px;margin-left:4px">${fmtShort(it.value)}</span>` : ''}
    </div>
  `).join('');

  el.innerHTML = `<div class="wb-donut-wrap">
    <div class="wb-donut" style="background:conic-gradient(${gradientParts.join(',')})"></div>
    <div class="wb-donut-legend">${legend}</div>
  </div>`;
}

/* ─── pnlTable: построчный P&L (3 режима: grouped/dense/waterfall) ─── */

// Build canonical row set once — used by all view modes
function buildPnlRowSet(f) {
  const gmvF = f.deals.clientRevenue || 0;
  const transitF = f.deals.transitToPartner || 0;
  const commissionF = f.deals.commissionEA || 0;
  const marketingSpend = f.expenses.marketingSpend || 0;
  const marketingFot = f.expenses.marketingFot || 0;
  const fixedTotal = f.expenses.fixedTotal || 0;
  const fixedList = f.expenses.fixed || [];
  const acquiringF = f.expenses.acquiringFact || 0;
  const taxF = f.tax.amountFact || 0;
  const netF = f.netProfit || 0;

  const gmvP = f.deals.totalPipeline || 0;
  const transitP = f.deals.pipelineTransit || Math.max(gmvP - (f.deals.totalProfit||0), 0);
  const commissionP = f.deals.totalProfit || 0;
  const acquiringP = f.expenses.acquiringPipe || 0;
  const taxP = f.tax.amountPipe || 0;
  const netP = f.netProfitPipe || 0;

  const variableTotal = marketingSpend + marketingFot;
  const marginalF = commissionF - variableTotal;
  const marginalP = commissionP - variableTotal;
  const ebitdaF = marginalF - fixedTotal;
  const ebitdaP = marginalP - fixedTotal;

  return {
    commissionF, commissionP, gmvF, gmvP,
    income: [
      { label: 'Выручка клиентов (GMV)',  fact: gmvF,        pipe: gmvP,        type: 'income',   drill: 'deals-all-opp' },
      { label: 'Транзит партнёру',        fact: -transitF,   pipe: -transitP,   type: 'transit',  drill: 'deals-all-transit' },
      { label: 'Комиссия EA',             fact: commissionF, pipe: commissionP, type: 'income',   drill: 'deals-all-profit', headline: true },
    ],
    variable: [
      { label: 'Маркетинг (спенд)',       fact: -marketingSpend, pipe: -marketingSpend, type: 'expense', drill: 'marketing-spend' },
      { label: 'ФОТ маркетинга',          fact: -marketingFot,   pipe: -marketingFot,   type: 'expense', drill: 'staff' },
    ],
    fixed: [
      ...fixedList.map(fx => ({
        label: fx.name || 'Расход',
        fact: -(fx.amount || 0), pipe: -(fx.amount || 0),
        type: 'expense', drill: 'fixed-' + (fx.id || fx.name),
      })),
    ],
    final: [
      { label: 'Эквайринг (3.5%)',        fact: -acquiringF, pipe: -acquiringP, type: 'expense',  drill: 'formula-acquiring' },
      { label: 'Налог',                   fact: -taxF,       pipe: -taxP,       type: 'expense',  drill: 'formula-tax' },
    ],
    profits: {
      marginal: { label: 'Marginal Profit', fact: marginalF, pipe: marginalP, type: marginalF >= 0 ? 'net-pos' : 'net-neg', headline: true },
      ebitda:   { label: 'EBITDA',          fact: ebitdaF,   pipe: ebitdaP,   type: ebitdaF   >= 0 ? 'net-pos' : 'net-neg', headline: true },
      net:      { label: 'ЧИСТАЯ ПРИБЫЛЬ',  fact: netF,      pipe: netP,      type: netF      >= 0 ? 'net-pos' : 'net-neg', final: true, drill: 'deals-all-profit' },
    },
  };
}

// % of commission EA (for expenses — how much of "our money" goes here)
function pnlPctOfCommission(value, commission) {
  if (!commission || commission === 0) return null;
  return Math.abs(value) / Math.abs(commission) * 100;
}

// Format % compactly
function pnlFmtPct(v) {
  if (v == null) return '';
  if (v >= 100) return Math.round(v) + '%';
  if (v >= 10) return v.toFixed(0) + '%';
  return v.toFixed(1) + '%';
}

// Compute fact color
function pnlFactColor(r) {
  if (r.fact == null) return '';
  if (r.fact < 0) return 'var(--rnp-red)';
  if (r.type === 'income' || r.type === 'net-pos') return 'var(--rnp-green)';
  if (r.type === 'net-neg') return 'var(--rnp-red)';
  return 'var(--rnp-text)';
}

// Dispatch renderer
function render_pnlTable(w, el) {
  const f = DATA.fact;
  if (!f) { el.innerHTML = '<div class="rnp-empty">Нет данных</div>'; return; }

  const mode = w.viewMode || 'grouped';
  const data = buildPnlRowSet(f);

  if (mode === 'dense')     return pnlRenderDense(w, el, data, f);
  if (mode === 'waterfall') return pnlRenderWaterfall(w, el, data, f);
  return pnlRenderGrouped(w, el, data, f); // default
}

/* ─── Mode 1: "Группы" — sections, bars normalized within group ─── */
function pnlRenderGrouped(w, el, data, f) {
  const { income, variable, fixed, final, profits, commissionF } = data;
  const period = f.period || '—';

  const section = (title, rows, maxAbsOverride, showPctOfCommission) => {
    if (rows.length === 0) return '';
    const maxAbs = maxAbsOverride || rows.reduce((m, r) => Math.max(m, Math.abs(r.fact||0), Math.abs(r.pipe||0)), 1);

    let html = `<div class="wb-pnl-grp-head">${title}</div><div class="wb-pnl-grp-body">`;
    for (const r of rows) {
      const factAbs = Math.abs(r.fact || 0);
      const pipeAbs = Math.abs(r.pipe || 0);
      const factPct = maxAbs > 0 ? factAbs / maxAbs * 100 : 0;
      const pipePct = maxAbs > 0 ? pipeAbs / maxAbs * 100 : 0;
      const color = pnlFactColor(r);
      const cls = r.headline ? 'wb-pnl-grp-headline' : r.final ? 'wb-pnl-grp-final' : '';
      const onclick = r.drill ? `onclick="wbPnlToggleDrill('${w.id}','${r.drill}',this)"` : '';
      const clickCls = r.drill ? 'wb-pnl-click' : '';
      const pctCommission = showPctOfCommission ? pnlPctOfCommission(r.fact, commissionF) : null;
      const pctLabel = pctCommission != null ? `<span class="wb-pnl-pct">${pnlFmtPct(pctCommission)}</span>` : '';

      html += `<div class="wb-pnl-grp-row ${cls} ${clickCls}" ${onclick}>
        <div class="wb-pnl-grp-label">${r.label}</div>
        <div class="wb-pnl-grp-bar">
          <div class="wb-pnl-bar-wrap">
            <div class="wb-pnl-bar-pipe ${r.type}" style="width:${pipePct}%"></div>
            <div class="wb-pnl-bar-fact ${r.type}" style="width:${factPct}%"></div>
          </div>
        </div>
        ${pctLabel}
        <div class="wb-pnl-grp-val" style="color:${color}">
          ${fmt(r.fact)}
          ${Math.abs(pipeAbs - factAbs) > 1 ? `<div class="wb-pnl-pipe-label">${fmt(r.pipe)}</div>` : ''}
        </div>
      </div>`;
    }
    html += '</div>';
    return html;
  };

  let html = `<div class="wb-pnl-groups">
    <div class="wb-pnl-period-label">${period} · факт ◼ pipeline</div>`;

  html += section('ДОХОДЫ', income, null, false);

  // Variable + Marginal together
  const varWithMarginal = [...variable, profits.marginal];
  html += section('ПЕРЕМЕННЫЕ РАСХОДЫ → MARGINAL', varWithMarginal, null, true);

  // Fixed + EBITDA together
  if (fixed.length > 0) {
    const fixedWithEbitda = [...fixed, profits.ebitda];
    html += section('ПОСТОЯННЫЕ РАСХОДЫ → EBITDA', fixedWithEbitda, null, true);
  }

  // Final expenses + Net
  const finalWithNet = [...final, profits.net];
  html += section('НАЛОГИ / ЭКВАЙРИНГ → ЧИСТАЯ', finalWithNet, null, true);

  html += '</div>';
  el.innerHTML = html;
}

/* ─── Mode 2: "Компакт" — single dense table with mini-bars ─── */
function pnlRenderDense(w, el, data, f) {
  const { income, variable, fixed, final, profits, commissionF } = data;
  const period = f.period || '—';

  // Combine all rows in order, keeping group breaks
  const allRows = [
    ...income.map(r => ({ ...r })),
    { section: true, label: 'ПЕРЕМЕННЫЕ РАСХОДЫ' },
    ...variable.map(r => ({ ...r, isExpense: true })),
    { ...profits.marginal },
    { section: true, label: 'ПОСТОЯННЫЕ РАСХОДЫ' },
    ...fixed.map(r => ({ ...r, isExpense: true })),
    { ...profits.ebitda },
    ...final.map(r => ({ ...r, isExpense: true })),
    { ...profits.net },
  ];

  // Normalize bars within expenses group (excluding the big income values)
  const expenseMax = allRows.reduce((m, r) => {
    if (r.section || !r.isExpense) return m;
    return Math.max(m, Math.abs(r.fact||0));
  }, 1);
  const incomeMax = Math.max(Math.abs(income[0]?.fact||0), Math.abs(income[0]?.pipe||0), 1);
  const profitMax = Math.max(Math.abs(profits.marginal.fact||0), Math.abs(profits.ebitda.fact||0), Math.abs(profits.net.fact||0), Math.abs(commissionF), 1);

  let html = `<div style="max-height:520px;overflow:auto"><table class="wb-pnl-table wb-pnl-dense">
    <thead><tr>
      <th>Строка</th>
      <th style="width:20%">Факт</th>
      <th style="width:20%">Pipeline</th>
      <th style="width:10%">% от комиссии</th>
      <th style="width:20%">◼</th>
    </tr></thead><tbody>`;

  for (const r of allRows) {
    if (r.section) {
      html += `<tr class="wb-pnl-section"><td colspan="5">${r.label}</td></tr>`;
      continue;
    }
    let cls = '';
    if (r.headline) cls += 'wb-pnl-headline ';
    if (r.final) cls += 'wb-pnl-final ';
    if (r.drill) cls += 'wb-pnl-click ';

    const factAbs = Math.abs(r.fact || 0);
    const pipeAbs = Math.abs(r.pipe || 0);
    const useMax = r.isExpense ? expenseMax : (r.headline || r.final ? profitMax : incomeMax);
    const factPct = useMax > 0 ? factAbs / useMax * 100 : 0;
    const pipePct = useMax > 0 ? pipeAbs / useMax * 100 : 0;

    const color = pnlFactColor(r);
    const pipeColor = 'var(--rnp-text-muted)';

    // % — for expenses: from commission; for income: Gmv-based (skip first row)
    let pctStr = '';
    if (r.isExpense || r.headline || r.final) {
      const pct = pnlPctOfCommission(r.fact, commissionF);
      if (pct != null) pctStr = pnlFmtPct(pct);
    }

    const onclick = r.drill ? `onclick="wbPnlToggleDrill('${w.id}','${r.drill}',this)"` : '';

    html += `<tr class="${cls}" ${onclick}>
      <td class="wb-pnl-label">${r.label}</td>
      <td class="wb-pnl-val" style="color:${color}">${fmt(r.fact)}</td>
      <td class="wb-pnl-val" style="color:${pipeColor}">${r.pipe != null ? fmt(r.pipe) : ''}</td>
      <td class="wb-pnl-val" style="color:var(--rnp-text-muted);font-size:11px">${pctStr}</td>
      <td class="wb-pnl-bar-cell" style="padding:0 8px !important">
        <div class="wb-pnl-bar-wrap" style="height:12px">
          <div class="wb-pnl-bar-pipe ${r.type}" style="width:${pipePct}%"></div>
          <div class="wb-pnl-bar-fact ${r.type}" style="width:${factPct}%"></div>
        </div>
      </td>
    </tr>`;
  }
  html += '</tbody></table></div>';
  el.innerHTML = html;
}

/* ─── Mode 3: "Водопад" — waterfall chart on top, compact table below ─── */
function pnlRenderWaterfall(w, el, data, f) {
  const { income, variable, fixed, final, profits, commissionF } = data;
  const period = f.period || '—';

  // Build waterfall bars list (only fact values for the visual)
  const wfRows = [
    { label: 'GMV',              value: income[0].fact,         type: 'income' },
    { label: 'Транзит',          value: income[1].fact,         type: 'transit' },
    { label: 'Комиссия EA',      value: income[2].fact,         type: 'income',  marker: true },
    ...variable.map(v => ({ label: v.label, value: v.fact, type: 'expense' })),
    { label: profits.marginal.label, value: profits.marginal.fact, type: profits.marginal.type, marker: true },
    ...fixed.map(fx => ({ label: fx.label, value: fx.fact, type: 'expense' })),
    { label: profits.ebitda.label,   value: profits.ebitda.fact,   type: profits.ebitda.type,   marker: true },
    ...final.map(fn => ({ label: fn.label, value: fn.fact, type: 'expense' })),
    { label: profits.net.label,      value: profits.net.fact,      type: profits.net.type,      marker: true, final: true },
  ];

  const maxAbs = wfRows.reduce((m, r) => Math.max(m, Math.abs(r.value||0)), 1);

  let wfHtml = `<div class="wb-pnl-wf">`;
  for (const r of wfRows) {
    const pct = Math.abs(r.value) / maxAbs * 100;
    const color = r.value >= 0
      ? (r.type === 'income' || r.type === 'net-pos' ? 'var(--rnp-green)' : (r.type === 'transit' ? '#64748b' : 'var(--rnp-green)'))
      : 'var(--rnp-red)';
    const cls = r.marker ? (r.final ? 'wb-pnl-wf-final' : 'wb-pnl-wf-marker') : '';
    wfHtml += `<div class="wb-pnl-wf-row ${cls}">
      <div class="wb-pnl-wf-label">${r.label}</div>
      <div class="wb-pnl-wf-bar-wrap">
        <div class="wb-pnl-wf-bar ${r.type}" style="width:${pct}%;background:${color}"></div>
      </div>
      <div class="wb-pnl-wf-val" style="color:${color}">${fmt(r.value)}</div>
    </div>`;
  }
  wfHtml += '</div>';

  // Compact table below
  const allRows = [
    ...income,
    { section: true, label: 'Переменные' },
    ...variable,
    profits.marginal,
    ...(fixed.length > 0 ? [{ section: true, label: 'Постоянные' }, ...fixed, profits.ebitda] : [profits.ebitda]),
    ...final,
    profits.net,
  ];

  let tblHtml = `<table class="wb-pnl-table wb-pnl-dense" style="margin-top:12px">
    <thead><tr>
      <th>Строка</th><th style="width:25%">Факт</th><th style="width:25%">Pipeline</th><th style="width:15%">%</th>
    </tr></thead><tbody>`;

  for (const r of allRows) {
    if (r.section) {
      tblHtml += `<tr class="wb-pnl-section"><td colspan="4">${r.label}</td></tr>`;
      continue;
    }
    let cls = '';
    if (r.headline) cls += 'wb-pnl-headline ';
    if (r.final) cls += 'wb-pnl-final ';
    if (r.drill) cls += 'wb-pnl-click ';

    const color = pnlFactColor(r);
    const pct = (r.type === 'expense' || r.headline || r.final) ? pnlPctOfCommission(r.fact, commissionF) : null;
    const onclick = r.drill ? `onclick="wbPnlToggleDrill('${w.id}','${r.drill}',this)"` : '';

    tblHtml += `<tr class="${cls}" ${onclick}>
      <td class="wb-pnl-label">${r.label}</td>
      <td class="wb-pnl-val" style="color:${color}">${fmt(r.fact)}</td>
      <td class="wb-pnl-val" style="color:var(--rnp-text-muted)">${r.pipe != null ? fmt(r.pipe) : ''}</td>
      <td class="wb-pnl-val" style="color:var(--rnp-text-muted);font-size:11px">${pct != null ? pnlFmtPct(pct) : ''}</td>
    </tr>`;
  }
  tblHtml += '</tbody></table>';

  el.innerHTML = `<div class="wb-pnl-period-label">${period}</div>${wfHtml}${tblHtml}`;
}

/* ─── Drill-down for P&L rows ─── */
async function wbPnlToggleDrill(widgetId, drillKey, rowEl) {
  // Close existing drill under this widget
  const widgetEl = document.querySelector(`[data-wid="${widgetId}"]`);
  if (!widgetEl) return;
  const existing = widgetEl.querySelector('.wb-pnl-drill-row');
  if (existing) {
    const wasFor = existing.dataset.for;
    existing.remove();
    widgetEl.querySelectorAll('.wb-pnl-click.is-open').forEach(r => r.classList.remove('is-open'));
    if (wasFor === drillKey) return; // same row → just close
  }

  rowEl.classList.add('is-open');

  // Insert drilldown row after the clicked row
  const tr = document.createElement('tr');
  tr.className = 'wb-pnl-drill-row';
  tr.dataset.for = drillKey;
  const td = document.createElement('td');
  td.colSpan = 3;
  const box = document.createElement('div');
  box.className = 'wb-pnl-drill-box';
  box.innerHTML = '<div class="wb-pnl-drill-loading">Загрузка...</div>';
  td.appendChild(box);
  tr.appendChild(td);
  rowEl.parentNode.insertBefore(tr, rowEl.nextSibling);

  try {
    const html = await wbPnlLoadDrill(drillKey);
    box.innerHTML = html;
  } catch (e) {
    box.innerHTML = `<div class="wb-pnl-drill-empty" style="color:var(--rnp-red)">Ошибка: ${e.message}</div>`;
  }
}

async function wbPnlLoadDrill(drillKey) {
  const f = DATA.fact;
  if (!f) return '<div class="wb-pnl-drill-empty">Нет данных</div>';

  // Static drills (no API call)
  if (drillKey === 'marketing-spend') {
    const mk = f.expenses.marketingByName || {};
    const entries = Object.entries(mk);
    if (entries.length === 0) return '<div class="wb-pnl-drill-empty">Нет данных по кампаниям</div>';
    return entries.map(([name, amt]) => `
      <div class="wb-pnl-drill-row-item">
        <span style="flex:1">Яндекс Директ — ${name}</span>
        <span class="dd-amt" style="color:var(--rnp-red)">${fmt(-amt)}</span>
      </div>
    `).join('');
  }

  if (drillKey === 'staff') {
    const staff = f.expenses.staff || [];
    if (staff.length === 0) return '<div class="wb-pnl-drill-empty">Нет сотрудников</div>';
    return staff.map(s => `
      <div class="wb-pnl-drill-row-item">
        <span style="flex:1">${s.name} — ${s.role || ''} (${s.detail || s.cost_type})</span>
        <span class="dd-amt" style="color:var(--rnp-red)">${fmt(-(s.amount||0))}</span>
      </div>
    `).join('');
  }

  if (drillKey.startsWith('fixed-')) {
    const fx = (f.expenses.fixed || []).find(x => 'fixed-' + (x.id || x.name) === drillKey);
    if (!fx) return '<div class="wb-pnl-drill-empty">Не найдено</div>';
    return `<div class="wb-pnl-drill-row-item">
      <span style="flex:1">${fx.name} (${fx.category || ''})</span>
      <span class="dd-amt" style="color:var(--rnp-red)">${fmt(-(fx.amount||0))}</span>
    </div>`;
  }

  if (drillKey === 'formula-acquiring') {
    const fact = f.expenses.acquiringFact || 0;
    const pipe = f.expenses.acquiringPipe || 0;
    return `<div class="wb-pnl-drill-row-item">
      <span style="flex:1">3.5% × 70% безнал от выручки</span>
      <span style="color:var(--rnp-text-muted);font-size:10px;margin-right:12px">факт: ${fmt(-fact)} · pipe: ${fmt(-pipe)}</span>
    </div>`;
  }

  if (drillKey === 'formula-tax') {
    const tax = f.tax || {};
    const regime = tax.regime || 'usn_15';
    return `<div class="wb-pnl-drill-row-item">
      <span style="flex:1">Режим: ${regime} · ставка ${Math.round((tax.rate||0)*100)}%</span>
      <span style="color:var(--rnp-text-muted);font-size:10px;margin-right:12px">факт: ${fmt(-(tax.amountFact||0))} · pipe: ${fmt(-(tax.amountPipe||0))}</span>
    </div>`;
  }

  // Deal-based drills
  const field = drillKey === 'deals-all-opp' ? 'opportunity'
             : drillKey === 'deals-all-transit' ? 'transit'
             : drillKey === 'deals-all-profit' ? 'profit'
             : null;
  if (!field) return '<div class="wb-pnl-drill-empty">Нет данных для этой строки</div>';

  const deals = [...(DATA.deals || [])];
  if (deals.length === 0) return '<div class="wb-pnl-drill-empty">Нет сделок в периоде</div>';

  const isWon = d => {
    const s = (d.stage_name||'').toLowerCase();
    return s.includes('paid') || s.includes('completed') || s.includes('won');
  };

  // Sort: won first (desc by value), then pipeline deals (desc by value)
  deals.sort((a, b) => {
    const aWon = isWon(a) ? 1 : 0;
    const bWon = isWon(b) ? 1 : 0;
    if (aWon !== bWon) return bWon - aWon;
    const av = field === 'transit' ? ((a.opportunity||0) - (a.profit||0)) : (a[field] || 0);
    const bv = field === 'transit' ? ((b.opportunity||0) - (b.profit||0)) : (b[field] || 0);
    return bv - av;
  });

  const limit = 100;
  const shown = deals.slice(0, limit);

  let html = '';
  for (const d of shown) {
    const won = isWon(d);
    const val = field === 'transit' ? ((d.opportunity||0) - (d.profit||0)) : (d[field] || 0);
    const badge = won
      ? '<span class="wb-pnl-drill-won-badge">WON</span>'
      : '<span class="wb-pnl-drill-pipe-badge">pipe</span>';
    html += `<div class="wb-pnl-drill-row-item ${won ? 'is-won' : ''}">
      ${badge}
      <span style="color:var(--rnp-blue)" title="В реальном дашборде — ссылка на сделку в CRM (${d.title||''})">${d.title || '—'}</span>
      <span class="dd-stage">${d.stage_name || ''}</span>
      <span class="dd-amt" style="color:${won ? 'var(--rnp-green)' : 'var(--rnp-text-muted)'}">${fmt(val)}</span>
    </div>`;
  }

  if (deals.length > limit) {
    html += `<div class="wb-pnl-drill-empty">Показано ${limit} из ${deals.length}</div>`;
  }

  return html;
}

/* ─── marketerCompare: Дмитрий vs Илья в таблице ─── */
function render_marketerCompare(w, el) {
  const f = DATA.fact;
  if (!f) { el.innerHTML = '<div class="rnp-empty">Нет данных</div>'; return; }

  // Aggregate rnp rows by owner for the current period
  const rnp = DATA.rnp || [];
  const agg = { 'Дмитрий': {}, 'Илья': {} };
  const fields = ['spend','clicks','impressions','leads','qualLeads','appointments','arrivals','payments','payments_pipeline','revenue','revenue_pipeline','gmv'];
  for (const name of Object.keys(agg)) {
    for (const f of fields) agg[name][f] = 0;
  }
  for (const r of rnp) {
    const a = agg[r.owner];
    if (!a) continue;
    for (const k of fields) a[k] += r[k] || 0;
  }

  const dm = agg['Дмитрий'];
  const il = agg['Илья'];

  // Spend: prefer rnp-aggregated (per-day accurate). Fall back to summary.marketing if rnp empty.
  const dmSpend = dm.spend || f.marketing.dmitry?.budget || 0;
  const ilSpend = il.spend || f.marketing.ilya?.budget || 0;
  // FOT from summary (pro-rated by range already done on server)
  const dmFot = f.marketing.dmitry?.fot || 0;
  const ilFot = il.fot || f.marketing.ilya?.fot || 0;

  const dmLeads = dm.leads;
  const ilLeads = il.leads;
  const dmCPL = dmLeads > 0 ? dmSpend / dmLeads : 0;
  const ilCPL = ilLeads > 0 ? ilSpend / ilLeads : 0;

  // Appointments / arrivals / payments — voronka steps
  const dmAppt = dm.appointments;
  const ilAppt = il.appointments;
  const dmArr = dm.arrivals;
  const ilArr = il.arrivals;
  const dmPaid = dm.payments;
  const ilPaid = il.payments;

  // GMV (opportunity) and Commission (revenue = EA profit) — actual WON money
  const dmGmv = dm.gmv;
  const ilGmv = il.gmv;
  const dmComm = dm.revenue;
  const ilComm = il.revenue;
  // Pipeline projections
  const dmCommPipe = dm.revenue_pipeline;
  const ilCommPipe = il.revenue_pipeline;

  const dmCAC = dmPaid > 0 ? (dmSpend + dmFot) / dmPaid : 0;
  const ilCAC = ilPaid > 0 ? (ilSpend + ilFot) / ilPaid : 0;

  const dmInvest = dmSpend + dmFot;
  const ilInvest = ilSpend + ilFot;
  const dmROMI = dmInvest > 0 ? ((dmComm - dmInvest) / dmInvest) * 100 : 0;
  const ilROMI = ilInvest > 0 ? ((ilComm - ilInvest) / ilInvest) * 100 : 0;

  const dmMarg = dmComm - dmInvest;
  const ilMarg = ilComm - ilInvest;

  const CAC_FLAG = 6000;
  const noData = rnp.length === 0;

  const rows = [
    { label: 'Spend (Y.Direct)', d: dmSpend, i: ilSpend, format: 'money' },
    { label: 'Лиды', d: dmLeads, i: ilLeads, format: 'num' },
    { label: 'CPL', d: dmCPL, i: ilCPL, format: 'money' },
    { label: 'Квал. лиды', d: dm.qualLeads, i: il.qualLeads, format: 'num' },
    { label: 'Встречи назначены', d: dmAppt, i: ilAppt, format: 'num' },
    { label: 'Доехали', d: dmArr, i: ilArr, format: 'num' },
    { label: 'Оплачено', d: dmPaid, i: ilPaid, format: 'num' },
    { label: 'GMV', d: dmGmv, i: ilGmv, format: 'money' },
    { label: 'Комиссия EA (факт)', d: dmComm, i: ilComm, format: 'money', headline: true },
    { label: 'Комиссия (pipeline)', d: dmCommPipe, i: ilCommPipe, format: 'money', muted: true },
    { label: 'ФОТ', d: dmFot, i: ilFot, format: 'money' },
    { label: 'CAC', d: dmCAC, i: ilCAC, format: 'money', headline: true, flagRed: v => v > CAC_FLAG && v > 0 },
    { label: 'ROMI', d: dmROMI, i: ilROMI, format: 'pctRaw', headline: true, colorSign: true },
    { label: 'Marginal', d: dmMarg, i: ilMarg, format: 'money', headline: true, colorSign: true },
  ];

  // Determine leader (by Marginal)
  const leader = dmMarg > ilMarg ? 'd' : (ilMarg > dmMarg ? 'i' : null);

  let html = `<table class="wb-mcomp-table">
    <thead><tr>
      <th>Метрика</th>
      <th>Дмитрий ${leader==='d'?'<span class="wb-leader">★</span>':''}</th>
      <th>Илья ${leader==='i'?'<span class="wb-leader">★</span>':''}</th>
    </tr></thead><tbody>`;

  // Helper: format cell with fallback for empty data
  const showCell = (val, fmt, muted) => {
    if (noData && val === 0) return '<span style="color:var(--rnp-text-muted);opacity:0.35">—</span>';
    if (val === 0 || val == null) return '<span style="color:var(--rnp-text-muted);opacity:0.5">—</span>';
    const s = fmtAuto(val, fmt);
    return muted ? `<span style="color:var(--rnp-text-muted);font-size:11px">${s}</span>` : s;
  };

  for (const r of rows) {
    let cls = r.headline ? 'wb-pnl-headline' : '';
    if (r.muted) cls += ' wb-pnl-muted';
    const dStyle = [];
    const iStyle = [];
    if (r.flagRed?.(r.d)) dStyle.push('color:var(--rnp-red)');
    if (r.flagRed?.(r.i)) iStyle.push('color:var(--rnp-red)');
    if (r.colorSign) {
      if (r.d !== 0) dStyle.push('color:' + (r.d > 0 ? 'var(--rnp-green)' : 'var(--rnp-red)'));
      if (r.i !== 0) iStyle.push('color:' + (r.i > 0 ? 'var(--rnp-green)' : 'var(--rnp-red)'));
    }
    html += `<tr class="${cls}">
      <td class="wb-pnl-label">${r.label}</td>
      <td class="wb-pnl-val" style="${dStyle.join(';')}">${showCell(r.d, r.format, r.muted)}</td>
      <td class="wb-pnl-val" style="${iStyle.join(';')}">${showCell(r.i, r.format, r.muted)}</td>
    </tr>`;
  }
  html += '</tbody></table>';

  // Banner if rnp data is missing
  if (noData) {
    html += `<div style="margin-top:8px;padding:6px 10px;background:rgba(251,191,36,.08);border-left:3px solid var(--rnp-yellow);border-radius:4px;font-size:11px;color:var(--rnp-yellow)">
      ⚠ Нет данных РНП в этом периоде — проверь синк Яндекс.Директа
    </div>`;
  }

  // Alert line if any CAC > threshold
  if (!noData && (dmCAC > CAC_FLAG || ilCAC > CAC_FLAG)) {
    html += `<div style="margin-top:8px;padding:6px 10px;background:rgba(248,113,113,.1);border-left:3px solid var(--rnp-red);border-radius:4px;font-size:11px;color:var(--rnp-red)">
      ⚠ CAC превысил ${fmt(CAC_FLAG)} — маркетолог работает в минус
    </div>`;
  }

  el.innerHTML = html;
}

/* ─── unitEconByComplex: Unit economics по типу комплекса ─── */
function render_unitEconByComplex(w, el) {
  const f = DATA.fact;
  if (!f) { el.innerHTML = '<div class="rnp-empty">Нет данных</div>'; return; }

  const mix = f.deals.mix || [];
  // Use WON deals count for unit-economics (actually received money base)
  const wonDeals = f.deals.wonDeals || 0;
  const totalDeals = wonDeals > 0 ? wonDeals : (f.deals.total || 0);
  const totalSpend = (f.marketing.dmitry.budget || 0) + (f.marketing.ilya.budget || 0);
  const totalFot = (f.marketing.dmitry.fot || 0) + (f.marketing.ilya.fot || 0);
  const cacBase = totalSpend + totalFot;
  const cacPerDeal = totalDeals > 0 ? cacBase / totalDeals : 0;

  const rows = mix.map(m => {
    const count = Math.round(totalDeals * (m.pct / 100));
    const gmvEach = m.avgCheck || 0;
    const markup = m.markupType === 'zones' ? 0.22 : 0.18;
    const commEach = gmvEach * (markup / (1 + markup));
    const marginalEach = commEach - cacPerDeal;
    const marginalPct = commEach > 0 ? marginalEach / commEach : 0;
    return {
      name: m.name, count, pct: m.pct,
      gmvEach, commEach, cacPerDeal,
      marginalEach, marginalPct,
    };
  });

  // Find best and worst marginal
  let best = null, worst = null;
  for (const r of rows) {
    if (!best || r.marginalPct > best.marginalPct) best = r;
    if (r.marginalEach < 0 && (!worst || r.marginalEach < worst.marginalEach)) worst = r;
  }

  let html = `<table class="wb-ue-table">
    <thead><tr>
      <th>Комплекс</th>
      <th>Кол-во</th>
      <th>Доля</th>
      <th>Ср. чек</th>
      <th>Комиссия</th>
      <th>CAC</th>
      <th>Marginal</th>
      <th>Marg %</th>
    </tr></thead><tbody>`;

  for (const r of rows) {
    let rowStyle = '';
    if (r === best) rowStyle = 'background:rgba(74,222,128,.08)';
    else if (r === worst) rowStyle = 'background:rgba(248,113,113,.08)';
    const margColor = r.marginalEach >= 0 ? 'var(--rnp-green)' : 'var(--rnp-red)';

    html += `<tr style="${rowStyle}">
      <td class="wb-pnl-label">${r.name}</td>
      <td>${r.count}</td>
      <td style="color:var(--rnp-text-muted)">${r.pct}%</td>
      <td>${fmt(r.gmvEach)}</td>
      <td>${fmt(r.commEach)}</td>
      <td style="color:var(--rnp-text-muted)">${fmt(r.cacPerDeal)}</td>
      <td style="color:${margColor}">${fmt(r.marginalEach)}</td>
      <td style="color:${margColor}">${fmtPct(r.marginalPct)}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}
