/* ═══════════════════════════════════════════════════════════════════
   WIDGET CHROME — header with inline controls
   ═══════════════════════════════════════════════════════════════════ */

function widgetId() {
  return 'w_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
}

/* Build inline controls based on widget type */
/* ═══════════════════════════════════════════════════════════════════
   WIDGET VIEWS — variations of how the same widget renders data
   ═══════════════════════════════════════════════════════════════════ */
const WIDGET_VIEWS = {
  pnlTable: [
    { key: 'grouped',   label: 'Группы',   icon: '⊟' },
    { key: 'dense',     label: 'Компакт',  icon: '☰' },
    { key: 'waterfall', label: 'Водопад',  icon: '▃' },
  ],
  // Future: funnel, donut, etc. can declare their own views here
};

function buildInlineControls(w) {
  let html = '<div class="wb-ctrl">';

  // View mode selector (for types that have multiple views)
  const views = WIDGET_VIEWS[w.type];
  if (views && views.length > 1) {
    const current = w.viewMode || views[0].key;
    html += `<select data-ctrl="viewMode" onchange="updateWidgetCtrl('${w.id}','viewMode',this.value)" title="Вид">
      ${views.map(v => `<option value="${v.key}" ${current===v.key?'selected':''}>${v.icon} ${v.label}</option>`).join('')}
    </select>`;
  }

  // Metric selector (for types that support it)
  if (['funnel','donut','bar'].includes(w.type)) {
    html += `<select data-ctrl="metric" onchange="updateWidgetCtrl('${w.id}','metric',this.value)" title="Метрика">
      <option value="count" ${w.metric==='count'?'selected':''}>Кол-во</option>
      <option value="money" ${w.metric==='money'?'selected':''}>Деньги</option>
      ${w.type==='donut'?`<option value="margin" ${w.metric==='margin'?'selected':''}>Маржа</option>`:''}
    </select>`;
  }

  // Source filter (for types that work with deals)
  if (['funnel','table','waterfall'].includes(w.type)) {
    const sources = DIMENSIONS[0].values();
    html += `<select data-ctrl="source" onchange="updateWidgetCtrl('${w.id}','source',this.value)" title="Источник">
      ${sources.map(s => `<option value="${s.value}" ${(w.filters?.source||'')===s.value?'selected':''}>${s.label}</option>`).join('')}
    </select>`;
  }

  // Size selector
  html += `<select data-ctrl="size" onchange="updateWidgetCtrl('${w.id}','size',this.value)" title="Размер">
    <option value="full" ${w.size==='full'?'selected':''}>▬▬ full</option>
    <option value="half" ${w.size==='half'?'selected':''}>▬ half</option>
    <option value="third" ${w.size==='third'?'selected':''}>▬ third</option>
    <option value="quarter" ${w.size==='quarter'?'selected':''}>▪ quarter</option>
  </select>`;

  // Action buttons
  html += `<button class="wb-btn-icon" onclick="cloneWidget('${w.id}')" title="Дублировать">⧉</button>`;
  html += `<button class="wb-btn-icon wb-btn-delete" onclick="removeWidget('${w.id}')" title="Удалить">&times;</button>`;
  html += '</div>';
  return html;
}

function updateWidgetCtrl(id, ctrl, value) {
  const w = LAYOUT.find(w => w.id === id);
  if (!w) return;

  if (ctrl === 'metric') { w.metric = value; }
  else if (ctrl === 'source') {
    if (!w.filters) w.filters = {};
    w.filters.source = value || null;
  }
  else if (ctrl === 'size') {
    w.size = value;
    // Update grid class immediately
    const el = document.querySelector(`[data-wid="${id}"]`);
    if (el) {
      el.classList.remove('wb-full','wb-half','wb-third','wb-quarter');
      el.classList.add('wb-' + value);
    }
  }
  else if (ctrl === 'viewMode') { w.viewMode = value; }

  // Re-render just this widget's body
  const body = document.getElementById('wbody-' + id);
  if (body) {
    const renderer = RENDERERS[w.type];
    if (renderer) renderer(w, body);
  }
  saveLayout();
}

/* ═══════════════════════════════════════════════════════════════════
   GRID RENDERING + DRAG & DROP
   ═══════════════════════════════════════════════════════════════════ */

let LAYOUT = [];

/* ═══════════════════════════════════════════════════════════════════
   POINTER-BASED DRAG & DROP with FLIP animation
   ═══════════════════════════════════════════════════════════════════ */
const DND = {
  active: false,
  widgetId: null,
  ghostEl: null,
  sourceEl: null,
  gapEl: null,         // placeholder in grid
  startX: 0, startY: 0,
  offsetX: 0, offsetY: 0,
  currentInsertIdx: -1,
  moved: false,        // did pointer actually move?
  DRAG_THRESHOLD: 5,   // px before drag starts
};

function dndPointerDown(e, wid) {
  // Only start on left button, and only from header area
  if (e.button !== 0) return;
  // Don't drag if clicking on interactive elements
  if (e.target.closest('select, button, [contenteditable]')) return;

  DND.widgetId = wid;
  DND.startX = e.clientX;
  DND.startY = e.clientY;
  DND.moved = false;
  DND.active = false;

  const el = document.querySelector(`[data-wid="${wid}"]`);
  if (!el) return;
  DND.sourceEl = el;

  // Compute offset from pointer to element top-left
  const rect = el.getBoundingClientRect();
  DND.offsetX = e.clientX - rect.left;
  DND.offsetY = e.clientY - rect.top;

  document.addEventListener('pointermove', dndPointerMove);
  document.addEventListener('pointerup', dndPointerUp);
  // Prevent text selection while dragging
  e.preventDefault();
}

function dndPointerMove(e) {
  const dx = e.clientX - DND.startX;
  const dy = e.clientY - DND.startY;

  // Check threshold before starting drag
  if (!DND.active) {
    if (Math.abs(dx) < DND.DRAG_THRESHOLD && Math.abs(dy) < DND.DRAG_THRESHOLD) return;
    dndStartDrag(e);
  }

  // Move ghost
  if (DND.ghostEl) {
    DND.ghostEl.style.left = (e.clientX - DND.offsetX) + 'px';
    DND.ghostEl.style.top = (e.clientY - DND.offsetY) + 'px';
  }

  // Find insert position
  dndUpdateInsertPosition(e);
}

function dndStartDrag(e) {
  DND.active = true;
  DND.moved = true;
  const el = DND.sourceEl;
  if (!el) return;

  // Create ghost — clone of the widget
  const rect = el.getBoundingClientRect();
  const ghost = el.cloneNode(true);
  ghost.className = 'wb-ghost';
  ghost.style.width = rect.width + 'px';
  ghost.style.height = rect.height + 'px';
  ghost.style.left = rect.left + 'px';
  ghost.style.top = rect.top + 'px';
  document.body.appendChild(ghost);
  DND.ghostEl = ghost;

  // Fade source
  el.classList.add('dragging');

  // Create gap placeholder
  const gap = document.createElement('div');
  gap.className = `wb-drop-gap wb-${getWidgetById(DND.widgetId)?.size||'half'}`;
  gap.style.minHeight = rect.height + 'px';
  DND.gapEl = gap;

  // Record positions of all widgets BEFORE we modify DOM (FLIP: First)
  recordPositions();

  // Insert gap where the source widget was
  const grid = document.getElementById('widget-grid');
  const sourceIdx = [...grid.children].indexOf(el);
  DND.currentInsertIdx = sourceIdx;
  grid.insertBefore(gap, el.nextSibling);
  el.style.display = 'none'; // hide original, gap takes its place

  // Capture lock to prevent scroll issues
  el.setPointerCapture?.(e.pointerId);
}

function dndUpdateInsertPosition(e) {
  const grid = document.getElementById('widget-grid');
  const children = [...grid.children].filter(c => c !== DND.gapEl && c.style.display !== 'none');

  if (children.length === 0) return;

  // Find closest widget to cursor
  let bestIdx = 0;
  let bestDist = Infinity;
  let insertBefore = true;

  for (let i = 0; i < children.length; i++) {
    const child = children[i];
    const rect = child.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dist = Math.hypot(e.clientX - cx, e.clientY - cy);

    if (dist < bestDist) {
      bestDist = dist;
      bestIdx = i;
      // Above center → insert before, below → insert after
      insertBefore = e.clientY < cy;
    }
  }

  const targetChild = children[bestIdx];
  const newIdx = insertBefore ? bestIdx : bestIdx + 1;

  if (newIdx === DND.currentInsertIdx) return; // no change
  DND.currentInsertIdx = newIdx;

  // FLIP: First — record current positions
  recordPositions();

  // Move gap to new position
  if (DND.gapEl.parentNode) DND.gapEl.remove();
  if (insertBefore) {
    grid.insertBefore(DND.gapEl, targetChild);
  } else {
    grid.insertBefore(DND.gapEl, targetChild.nextSibling);
  }

  // FLIP: Last + Invert + Play
  animateFlip();
}

// FLIP animation state
let savedPositions = new Map();

function recordPositions() {
  savedPositions.clear();
  const grid = document.getElementById('widget-grid');
  for (const child of grid.children) {
    if (child === DND.gapEl) continue;
    const rect = child.getBoundingClientRect();
    savedPositions.set(child, { x: rect.left, y: rect.top });
  }
}

function animateFlip() {
  const grid = document.getElementById('widget-grid');
  for (const child of grid.children) {
    if (child === DND.gapEl || child.style.display === 'none') continue;
    const old = savedPositions.get(child);
    if (!old) continue;
    const newRect = child.getBoundingClientRect();
    const dx = old.x - newRect.left;
    const dy = old.y - newRect.top;
    if (Math.abs(dx) < 1 && Math.abs(dy) < 1) continue;

    // Invert
    child.style.transform = `translate(${dx}px, ${dy}px)`;
    child.style.transition = 'none';

    // Play
    requestAnimationFrame(() => {
      child.classList.add('wb-animating');
      child.style.transform = '';
      child.style.transition = '';
      child.addEventListener('transitionend', function cleanup() {
        child.classList.remove('wb-animating');
        child.removeEventListener('transitionend', cleanup);
      }, { once: true });
    });
  }
}

function dndPointerUp(e) {
  document.removeEventListener('pointermove', dndPointerMove);
  document.removeEventListener('pointerup', dndPointerUp);

  if (!DND.active) {
    DND.widgetId = null;
    DND.sourceEl = null;
    return;
  }

  // Remove ghost
  if (DND.ghostEl) { DND.ghostEl.remove(); DND.ghostEl = null; }

  // Show source again
  if (DND.sourceEl) {
    DND.sourceEl.classList.remove('dragging');
    DND.sourceEl.style.display = '';
  }

  // Calculate new layout order from DOM order (gap position = where widget goes)
  const grid = document.getElementById('widget-grid');
  const newOrder = [];
  for (const child of grid.children) {
    if (child === DND.gapEl) {
      // This is where the dragged widget should be inserted
      const w = getWidgetById(DND.widgetId);
      if (w) newOrder.push(w);
    } else if (child.dataset?.wid && child.dataset.wid !== DND.widgetId) {
      const w = getWidgetById(child.dataset.wid);
      if (w) newOrder.push(w);
    }
  }

  // If dragged widget wasn't placed via gap (edge case), append at end
  if (!newOrder.find(w => w.id === DND.widgetId)) {
    const w = getWidgetById(DND.widgetId);
    if (w) newOrder.push(w);
  }

  // Remove gap
  if (DND.gapEl) { DND.gapEl.remove(); DND.gapEl = null; }

  // Update layout
  LAYOUT = newOrder;

  // Reset
  DND.active = false;
  DND.widgetId = null;
  DND.sourceEl = null;
  DND.currentInsertIdx = -1;

  renderGrid();
  renderAllWidgets();
}

function getWidgetById(id) {
  return LAYOUT.find(w => w.id === id);
}

function renderGrid() {
  const grid = document.getElementById('widget-grid');

  if (LAYOUT.length === 0) {
    grid.innerHTML = '<div class="wb-grid-empty">Нажми «+ Виджет» чтобы начать</div>';
    updateCount();
    return;
  }

  grid.innerHTML = '';

  for (const w of LAYOUT) {
    const div = document.createElement('div');
    div.className = `wb-widget wb-${w.size||'half'} rnp-panel`;
    div.dataset.wid = w.id;

    div.innerHTML = `
      <div class="wb-widget-header">
        <span class="wb-widget-title" contenteditable="true" spellcheck="false"
              onblur="renameWidget('${w.id}',this.textContent)">${w.title||w.type}</span>
        ${buildInlineControls(w)}
      </div>
      <div class="wb-widget-body" id="wbody-${w.id}"></div>
    `;

    // Pointer-based drag from header
    const header = div.querySelector('.wb-widget-header');
    header.addEventListener('pointerdown', e => dndPointerDown(e, w.id));

    grid.appendChild(div);
  }

  updateCount();
}

function renderAllWidgets() {
  for (const w of LAYOUT) {
    const el = document.getElementById('wbody-' + w.id);
    if (!el) continue;
    const renderer = RENDERERS[w.type];
    if (renderer) renderer(w, el);
  }
  saveLayout();
}

function updateCount() {
  const el = document.getElementById('widget-count');
  if (el) el.textContent = LAYOUT.length ? `${LAYOUT.length} виджет${LAYOUT.length>4||LAYOUT.length===0?'ов':LAYOUT.length>1?'а':''}` : '';
}

/* ═══════════════════════════════════════════════════════════════════
   WIDGET ACTIONS
   ═══════════════════════════════════════════════════════════════════ */

function cloneWidget(id) {
  const w = LAYOUT.find(x => x.id === id);
  if (!w) return;
  const clone = JSON.parse(JSON.stringify(w));
  clone.id = widgetId();
  clone.title = (w.title || w.type) + ' (копия)';
  const idx = LAYOUT.indexOf(w);
  LAYOUT.splice(idx + 1, 0, clone);
  renderGrid();
  renderAllWidgets();
}

function removeWidget(id) {
  LAYOUT = LAYOUT.filter(w => w.id !== id);
  renderGrid();
  renderAllWidgets();
}

function renameWidget(id, newTitle) {
  const w = LAYOUT.find(x => x.id === id);
  if (w) { w.title = newTitle.trim(); saveLayout(); }
}

  document.getElementById('wizard-overlay').classList.remove('open');

function renderWizardStep1() {

          <div class="wb-tc-desc">${t.desc}</div>
        </div>
      `).join('')}

}

function wizardSelectType(type) {
  wizardState.type = type;
  renderWizardStep2();
}

  const t = wizardState.type;

      <div class="wb-config-label">Название</div>

    configHtml += `
      <div class="wb-config-row">
        <div class="wb-config-label">Значение</div>
        <div class="wb-config-input"><select id="wiz-valuePath">${catalogOptions('deals.wonProfit')}</select></div>
      </div>
      <div class="wb-config-row">
        <div class="wb-config-label">Из (всего)</div>
        <div class="wb-config-input"><select id="wiz-totalPath">${catalogOptions('deals.totalProfit')}</select></div>

    `;
  } else if (t === 'line') {
    configHtml += `
      <div class="wb-config-row">
        <div class="wb-config-label">Метрика</div>

  } else if (['funnel','donut'].includes(t)) {

            <option value="money">Деньги</option>
            ${t==='donut'?'<option value="margin">Маржа</option>':''}

  document.getElementById('wizard-body').innerHTML = configHtml;
  document.getElementById('wizard-foot').innerHTML = `
    <button class="rnp-button rnp-button-secondary" onclick="renderWizardStep1()">Назад</button>
    <button class="rnp-button" onclick="wizardAdd()">Добавить</button>
  `;
}

function wizardAdd() {
  const t = wizardState.type;
  const w = {
    id: widgetId(),
    type: t,
    title: document.getElementById('wiz-title')?.value || WIDGET_TYPES.find(x=>x.type===t)?.label || t,
    size: document.getElementById('wiz-size')?.value || 'half',
    metric: document.getElementById('wiz-metric')?.value || 'count',
    filters: {},
  };

  if (t === 'kpi') {
    w.dataPath = document.getElementById('wiz-dataPath')?.value || 'deals.total';
    w.accent = document.getElementById('wiz-accent')?.value || 'blue';
  } else if (t === 'hero') {
    w.valuePath = document.getElementById('wiz-valuePath')?.value || 'deals.wonProfit';
    w.totalPath = document.getElementById('wiz-totalPath')?.value || 'deals.totalProfit';
  } else if (t === 'line') {
    w.dataPath = document.getElementById('wiz-dataPath')?.value || 'deals.commissionEA';
  }

  LAYOUT.push(w);
  closeWizard();
  renderGrid();
  renderAllWidgets();
}

/* ═══════════════════════════════════════════════════════════════════
   PERSISTENCE
   ═══════════════════════════════════════════════════════════════════ */

function saveLayout() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ v:LAYOUT_VERSION, widgets:LAYOUT })); } catch(e) {}
}

function loadLayout() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (data.v === LAYOUT_VERSION && Array.isArray(data.widgets)) {
        LAYOUT = data.widgets;
        return true;
      }
    }
  } catch(e) {}
  return false;
}

/* ═══════════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════════ */

const PERIOD_STORAGE_KEY = 'ea-wb-period';

function savePeriod() {
  try { localStorage.setItem(PERIOD_STORAGE_KEY, JSON.stringify(PERIOD)); } catch(e) {}
}

function loadPeriodState() {
  try {
    const raw = localStorage.getItem(PERIOD_STORAGE_KEY);
    if (!raw) return;
    const p = JSON.parse(raw);
    if (p && p.mode) {
      PERIOD.mode = p.mode;
      PERIOD.offset = p.offset || 0;
      PERIOD.from = p.from || null;
      PERIOD.to = p.to || null;
    }
  } catch(e) {}
}

async function init() {
  if (!loadLayout()) {
    LAYOUT = JSON.parse(JSON.stringify(DEFAULT_LAYOUT));
  }
  loadPeriodState();

  // Sync period-select with saved state
  const sel = document.getElementById('wb-period-select');
  if (sel && ['7','14','30','60','90','mtd','custom'].includes(PERIOD.mode)) {
    sel.value = PERIOD.mode;
  }
  toggleCustomRange();
  updatePeriodUI();

  // Period select change
  sel.addEventListener('change', () => {
    PERIOD.mode = sel.value;
    PERIOD.offset = 0;
    toggleCustomRange();
    if (PERIOD.mode === 'custom') {
      // Initialize default range if not set
      if (!PERIOD.from || !PERIOD.to) {
        const today = new Date(); today.setHours(0,0,0,0);
        PERIOD.to = toISO(today);
        PERIOD.from = toISO(addDays(today, -29));
      }
      initLitepicker();
      if (LITEPICKER) LITEPICKER.setDateRange(PERIOD.from, PERIOD.to);
      updateTriggerLabel();
    }
    updatePeriodUI();
    savePeriod();
    reloadAll();
  });

  // Prev/next
  document.getElementById('wb-prev').addEventListener('click', () => {
    PERIOD.offset++;
    updatePeriodUI();
    savePeriod();
    reloadAll();
  });
  document.getElementById('wb-next').addEventListener('click', () => {
    if (PERIOD.offset > 0) {
      PERIOD.offset--;
      updatePeriodUI();
      savePeriod();
      reloadAll();
    }
  });

  // Preset buttons in custom range
  document.querySelectorAll('.wb-cr-preset').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.wb-cr-preset').forEach(b => b.classList.remove('is-active'));
      btn.classList.add('is-active');
      applyPresetRange(btn.dataset.preset);
      savePeriod();
    });
  });

  // Mode toggle
  document.querySelectorAll('#mode-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#mode-toggle button').forEach(b => b.classList.remove('is-active'));
      btn.classList.add('is-active');
      reloadAll();
    });
  });

  try {
    loadSyncStatus();
  } catch(e) {}

  // If we start in custom mode, init picker immediately
  if (PERIOD.mode === 'custom') {
    initLitepicker();
  }

  renderGrid();
  reloadAll();
}

async function reloadAll() {
  try {
    await loadFactFromAPI();
  } catch(e) {
    console.error('Data load failed:', e);
    document.getElementById('widget-grid').innerHTML = `<div class="wb-grid-empty" style="color:var(--rnp-red)">Ошибка загрузки: ${e.message}</div>`;
    return;
  }
  renderAllWidgets();
}

document.addEventListener('DOMContentLoaded', init);
</script>
